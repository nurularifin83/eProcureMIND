name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # environment:
    #   name: github-pages
    #   url: ${{ steps.deployment.outputs.page_url }}

    env:
      CI: true
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          VENDOR_USERNAME: ${{ secrets.VENDOR_USERNAME }}
          VENDOR_PASSWORD: ${{ secrets.VENDOR_PASSWORD }}
          HSE_USERNAME: ${{ secrets.HSE_USERNAME }}
          HSE_PASSWORD: ${{ secrets.HSE_PASSWORD }}
          ADMIN_SCM_USERNAME: ${{ secrets.ADMIN_SCM_USERNAME }}
          ADMIN_SCM_PASSWORD: ${{ secrets.ADMIN_SCM_PASSWORD }}
          VML_USERNAME: ${{ secrets.VML_USERNAME }}
          VML_PASSWORD: ${{ secrets.VML_PASSWORD }}
          HEAD_SCM_USERNAME: ${{ secrets.HEAD_SCM_USERNAME }}
          HEAD_SCM_PASSWORD: ${{ secrets.HEAD_SCM_PASSWORD }}
          CREATOR_PROCPLAN_USERNAME: ${{ secrets.CREATOR_PROCPLAN_USERNAME }}
          CREATOR_PROCPLAN_PASSWORD: ${{ secrets.CREATOR_PROCPLAN_PASSWORD }}
          REQUESTER_PROCPLAN_USERNAME: ${{ secrets.REQUESTER_PROCPLAN_USERNAME }}
          REQUESTER_PROCPLAN_PASSWORD: ${{ secrets.REQUESTER_PROCPLAN_PASSWORD }}
          CONFIRMER_PROCPLAN_USERNAME: ${{ secrets.CONFIRMER_PROCPLAN_USERNAME }}
          CONFIRMER_PROCPLAN_PASSWORD: ${{ secrets.CONFIRMER_PROCPLAN_PASSWORD }}
          REVIEWER_PROCPLAN_USERNAME: ${{ secrets.REVIEWER_PROCPLAN_USERNAME }}
          REVIEWER_PROCPLAN_PASSWORD: ${{ secrets.REVIEWER_PROCPLAN_PASSWORD }}

      # 👇 STEP 1 - Set environment info for Allure
      # To use real URL later, replace Base_URL value with: ${{ secrets.BASE_URL }}
      - name: Set Allure Environment Info
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties << EOF
          Application=Procsi
          Environment=QA
          Browser=Chromium
          Base_URL=https://app.procsi.id
          EOF
        if: always()

      - name: Set Allure Executor Info
        run: |
          cat > allure-results/executor.json << EOF
          {
            "name": "Nurul Arifin",
            "type": "github",
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportUrl": "https://nurularifin83.github.io/eProcureMIND/"
          }
          EOF
        if: always()

      # 👇 STEP 2 - Download previous history for Trend chart
      - name: Download Previous Allure History
        uses: dawidd6/action-download-artifact@v6
        with:
          name: allure-history
          path: allure-results/history
          workflow: playwright.yml
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Install Allure CLI
        run: npm install -g allure-commandline
        if: always()

      # 👇 STEP 3 - Copy history before generating
      - name: Copy Allure History
        run: |
          if [ -d "allure-results/history" ]; then
            cp -r allure-results/history allure-report-history
          fi
        if: always()

      # 👇 STEP 4 - Generate Allure Report
      - name: Generate Allure Report
        run: allure generate allure-results --clean -o allure-report
        if: always()

      # 👇 STEP 5 - Restore history into report
      - name: Restore Allure History
        run: |
          if [ -d "allure-report-history" ]; then
            cp -r allure-report-history/* allure-report/history/
          fi
        if: always()

      # 👇 STEP 6 - Upload history for next run
      - name: Upload Allure History
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: allure-history
          path: allure-report/history
          retention-days: 30

      - name: Keep artifact for debugging
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        if: github.ref == 'refs/heads/main'

      - name: Slack Notification
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
          text: |
            *Playwright Test Results*
            Report: https://nurularifin83.github.io/eProcureMIND/
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
